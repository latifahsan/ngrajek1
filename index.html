<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desa Sukamaju — Tanah Subur, Jiwa Merdeka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<style>
  :root {
    --forest: #1F3B2C;
    --forest-light: #2a5040;
    --olive: #4A5E3A;
    --olive-light: #6b7c52;
    --cream: #F5F1E8;
    --cream-dark: #E8E2D4;
    --earth: #6B4F3A;
    --earth-light: #8B6F5A;
    --white: #FFFFFF;
    --text-dark: #1a2a1e;
    --text-muted: #6b7c6e;
    --gold: #C9A84C;
    --gold-light: #E8C96E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* ===================== PRELOADER ===================== */
  #preloader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--forest);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #preloader.hide { opacity: 0; visibility: hidden; }

  .preloader-logo {
    width: 80px; height: 80px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: var(--gold);
    animation: pulse-logo 2s ease infinite;
  }
  @keyframes pulse-logo {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
    50% { box-shadow: 0 0 0 20px rgba(201,168,76,0); }
  }

  .preloader-text {
    color: var(--cream);
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .preloader-bar {
    width: 160px; height: 1px;
    background: rgba(255,255,255,0.15);
    border-radius: 99px;
    overflow: hidden;
  }
  .preloader-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 99px;
    animation: fill-bar 2s ease forwards;
  }
  @keyframes fill-bar {
    0% { width: 0; }
    100% { width: 100%; }
  }

  /* ===================== SCROLL PROGRESS ===================== */
  #scroll-progress {
    position: fixed; top: 0; left: 0; height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--olive-light));
    z-index: 9998; width: 0;
    transition: width 0.1s linear;
  }

  /* ===================== NAVBAR ===================== */
  #navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 20px 5%;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.4s ease;
  }
  #navbar.scrolled {
    background: rgba(31, 59, 44, 0.95);
    backdrop-filter: blur(20px);
    padding: 14px 5%;
    box-shadow: 0 4px 30px rgba(0,0,0,0.2);
  }

  .nav-logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none;
  }
  .nav-logo-icon {
    width: 40px; height: 40px;
    border: 1.5px solid rgba(201,168,76,0.8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 14px; color: var(--gold);
  }
  .nav-logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 600;
    color: var(--white);
    line-height: 1.2;
  }
  .nav-logo-text span { font-size: 10px; font-weight: 300; letter-spacing: 2px; display: block; color: rgba(255,255,255,0.6); font-family: 'Poppins', sans-serif; }

  .nav-links {
    display: flex; align-items: center; gap: 32px;
    list-style: none;
  }
  .nav-links a {
    font-size: 13px; font-weight: 400; letter-spacing: 1px;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    position: relative;
    transition: color 0.3s;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width 0.3s ease;
  }
  .nav-links a:hover { color: var(--gold-light); }
  .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
  .nav-links a.active { color: var(--gold-light); }

  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 4px;
  }
  .hamburger span {
    display: block; width: 24px; height: 1.5px;
    background: var(--white);
    transition: all 0.3s ease;
  }
  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4.5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4.5px); }

  .mobile-menu {
    display: none;
    position: fixed; inset: 0; z-index: 999;
    background: rgba(31, 59, 44, 0.98);
    backdrop-filter: blur(20px);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 32px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    font-family: 'Playfair Display', serif;
    font-size: 28px; color: var(--cream);
    text-decoration: none; font-weight: 400;
    transition: color 0.3s;
  }
  .mobile-menu a:hover { color: var(--gold-light); }

  /* ===================== RUNNING TEXT ===================== */
  .running-text {
    position: fixed; top: 72px; left: 0; right: 0; z-index: 990;
    background: rgba(31, 59, 44, 0.7);
    backdrop-filter: blur(10px);
    padding: 7px 0;
    overflow: hidden;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    transition: top 0.4s ease;
  }
  .running-text-inner {
    display: flex; align-items: center; gap: 60px;
    animation: scroll-text 30s linear infinite;
    white-space: nowrap;
    width: max-content;
  }
  @keyframes scroll-text {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .running-text-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: rgba(255,255,255,0.75);
    letter-spacing: 1px;
  }
  .running-text-item .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--gold); flex-shrink: 0;
  }

  /* ===================== HERO SECTION ===================== */
  #hero {
    position: relative; height: 100vh; min-height: 600px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute; inset: 0;
    background: 
      linear-gradient(135deg, #0d1f15 0%, #1a3525 30%, #2d5a3d 60%, #1a3525 100%);
  }

  /* Cinematic layered background */
  .hero-bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image: 
      radial-gradient(ellipse at 20% 80%, rgba(74,94,58,0.5) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(31,59,44,0.8) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(107,79,58,0.2) 0%, transparent 70%);
  }

  /* Grain texture */
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.3;
    mix-blend-mode: overlay;
  }

  /* Animated nature elements */
  .hero-nature {
    position: absolute; inset: 0; overflow: hidden;
  }
  .nature-layer {
    position: absolute; bottom: 0; left: 0; right: 0;
  }

  /* SVG rice field silhouette */
  .rice-field-svg {
    position: absolute; bottom: 0; left: 0; right: 0;
    opacity: 0.25;
  }

  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(13, 31, 21, 0.3) 0%,
      rgba(13, 31, 21, 0.1) 40%,
      rgba(13, 31, 21, 0.6) 80%,
      rgba(13, 31, 21, 0.95) 100%
    );
  }

  .hero-content {
    position: relative; z-index: 10;
    text-align: center;
    padding: 0 20px;
    max-width: 900px;
  }

  .hero-greeting {
    font-size: 13px; font-weight: 400;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold-light);
    opacity: 0.85;
    margin-bottom: 20px;
    animation: fadeUp 1s ease 0.5s both;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(52px, 8vw, 110px);
    font-weight: 700;
    color: var(--white);
    line-height: 1.05;
    letter-spacing: -2px;
    animation: fadeUp 1s ease 0.7s both;
  }
  .hero-title em {
    font-style: italic; color: var(--gold-light);
  }

  .hero-tagline {
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 1.5vw, 16px);
    letter-spacing: 6px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-top: 12px;
    animation: fadeUp 1s ease 0.9s both;
  }

  .hero-desc {
    font-size: clamp(14px, 1.5vw, 16px);
    color: rgba(255,255,255,0.65);
    font-weight: 300;
    max-width: 480px;
    margin: 24px auto 0;
    line-height: 1.8;
    animation: fadeUp 1s ease 1.1s both;
  }

  .hero-cta {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-top: 40px;
    animation: fadeUp 1s ease 1.3s both;
    flex-wrap: wrap;
  }

  .btn-primary {
    padding: 14px 32px;
    background: var(--gold);
    color: var(--forest);
    font-size: 13px; font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: all 0.3s ease;
    border: none; cursor: pointer;
  }
  .btn-primary:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(201,168,76,0.35);
  }

  .btn-outline {
    padding: 13px 32px;
    background: transparent;
    color: var(--white);
    font-size: 13px; font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.35);
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .btn-outline:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    transform: translateY(-2px);
  }

  /* Floating glass card */
  .hero-glass-card {
    position: absolute; bottom: 80px; right: 5%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 18px 24px;
    display: flex; gap: 24px;
    animation: fadeUp 1s ease 1.5s both;
  }

  .glass-info-item {
    text-align: center;
  }
  .glass-info-label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.5); margin-bottom: 4px;
  }
  .glass-info-value {
    font-size: 18px; font-weight: 600; color: var(--white);
    font-family: 'Playfair Display', serif;
  }
  .glass-info-sub {
    font-size: 10px; color: rgba(255,255,255,0.45);
  }

  .glass-divider {
    width: 1px; background: rgba(255,255,255,0.1);
  }

  /* Scroll indicator */
  .scroll-indicator {
    position: absolute; bottom: 32px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    animation: fadeUp 1s ease 1.8s both;
  }
  .scroll-indicator span {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
    animation: scroll-line 2s ease infinite;
  }
  @keyframes scroll-line {
    0% { transform: scaleY(0); transform-origin: top; opacity: 1; }
    50% { transform: scaleY(1); transform-origin: top; opacity: 1; }
    51% { transform: scaleY(1); transform-origin: bottom; opacity: 1; }
    100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===================== ABOUT SECTION ===================== */
  .section-label {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--olive-light);
    font-weight: 500;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::before {
    content: ''; width: 32px; height: 1px; background: var(--olive-light);
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 600;
    color: var(--forest);
    line-height: 1.2;
    letter-spacing: -1px;
  }
  .section-title em {
    font-style: italic; color: var(--earth);
  }

  #about {
    padding: 120px 5%;
    background: var(--cream);
  }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }

  .about-text p {
    font-size: 15px; color: var(--text-muted);
    line-height: 1.9; margin-top: 24px;
    font-weight: 300;
  }

  .about-image-wrap {
    position: relative;
  }
  .about-image-main {
    width: 100%; aspect-ratio: 4/5;
    border-radius: 4px;
    overflow: hidden;
    background: linear-gradient(145deg, #2a5040, #4A5E3A, #1F3B2C);
    display: flex; align-items: center; justify-content: center;
  }
  .about-image-main svg { opacity: 0.4; }

  .about-image-float {
    position: absolute;
    bottom: -30px; left: -30px;
    width: 45%;
    aspect-ratio: 1;
    border-radius: 4px;
    background: linear-gradient(135deg, #6B4F3A, #8B6F5A);
    border: 4px solid var(--cream);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* ===================== HIGHLIGHTS ===================== */
  #highlights {
    padding: 0 5% 100px;
    background: var(--cream);
  }

  .highlights-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .highlight-card {
    padding: 32px 24px;
    background: var(--white);
    border-radius: 4px;
    border: 1px solid rgba(31,59,44,0.08);
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }
  .highlight-card::before {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }
  .highlight-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(31,59,44,0.12);
  }
  .highlight-card:hover::before { transform: scaleX(1); }

  .highlight-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, rgba(31,59,44,0.08), rgba(74,94,58,0.12));
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    font-size: 22px;
  }
  .highlight-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-weight: 600;
    color: var(--forest);
    margin-bottom: 8px;
  }
  .highlight-desc {
    font-size: 13px; color: var(--text-muted);
    line-height: 1.7; font-weight: 300;
  }

  /* ===================== STATS ===================== */
  #stats {
    padding: 100px 5%;
    background: var(--forest);
    position: relative;
    overflow: hidden;
  }
  #stats::before {
    content: '';
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse at 0% 0%, rgba(74,94,58,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 100% 100%, rgba(107,79,58,0.3) 0%, transparent 60%);
  }

  .stats-header {
    text-align: center; margin-bottom: 60px;
    position: relative; z-index: 1;
  }
  .stats-header .section-label { justify-content: center; }
  .stats-header .section-label::before { display: none; }
  .stats-header .section-title { color: var(--cream); }
  .stats-header .section-title em { color: var(--gold-light); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
    position: relative; z-index: 1;
  }

  .stat-card {
    text-align: center;
    padding: 36px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    transition: all 0.3s ease;
  }
  .stat-card:hover {
    background: rgba(255,255,255,0.08);
    transform: translateY(-4px);
  }

  .stat-icon { font-size: 28px; margin-bottom: 16px; }
  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 3vw, 42px);
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
    margin-bottom: 8px;
  }
  .stat-label {
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  /* ===================== POTENSI ===================== */
  #potensi {
    padding: 120px 5%;
    background: var(--cream-dark);
  }

  .potensi-header {
    text-align: center; margin-bottom: 60px;
  }

  .potensi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .potensi-grid .card-large {
    grid-column: span 2;
  }

  .potensi-card {
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    aspect-ratio: 16/10;
    cursor: pointer;
  }
  .potensi-card.card-large { aspect-ratio: 16/9; }
  .potensi-card.card-tall { aspect-ratio: 9/12; }

  .potensi-bg {
    position: absolute; inset: 0;
    transition: transform 0.6s ease;
  }
  .potensi-card:hover .potensi-bg { transform: scale(1.08); }

  .potensi-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(13,31,21,0.9) 0%, rgba(13,31,21,0.2) 50%, transparent 100%);
    transition: all 0.4s ease;
  }
  .potensi-card:hover .potensi-overlay {
    background: linear-gradient(to top, rgba(13,31,21,0.95) 0%, rgba(13,31,21,0.4) 60%, rgba(13,31,21,0.1) 100%);
  }

  .potensi-content {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 24px;
  }
  .potensi-badge {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(201,168,76,0.2);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 2px;
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 10px;
  }
  .potensi-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 2vw, 26px);
    color: var(--white); font-weight: 600;
    line-height: 1.3;
  }
  .potensi-desc {
    font-size: 13px; color: rgba(255,255,255,0.6);
    margin-top: 8px; line-height: 1.6;
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s ease;
    font-weight: 300;
  }
  .potensi-card:hover .potensi-desc { max-height: 60px; }

  /* Placeholder colorful backgrounds for cards */
  .bg-pertanian { background: linear-gradient(145deg, #1a3d28, #2d6b42, #1F3B2C); }
  .bg-alam { background: linear-gradient(145deg, #1a3525, #3d6b50, #264d38); }
  .bg-sejarah { background: linear-gradient(145deg, #3d2a1a, #6b4f3a, #4d3525); }
  .bg-kuliner { background: linear-gradient(145deg, #3d3014, #6b5a2a, #4d3d18); }
  .bg-umkm { background: linear-gradient(145deg, #1a2d3d, #2a4d6b, #1a3d5a); }

  /* Add decorative SVG to card backgrounds */
  .bg-pertanian::after, .bg-alam::after, .bg-sejarah::after, .bg-kuliner::after, .bg-umkm::after {
    content: '';
    position: absolute;
